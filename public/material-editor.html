<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Gelişmiş Materyal Editörü</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.9.359/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
        :root {
            --primary-color: #3b82f6; --secondary-color: #f3f4f6; --text-color: #1f2937;
            --accent-color: #10b981; --danger-color: #ef4444; --bg-color: #ffffff;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background-color: var(--secondary-color); color: var(--text-color); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background-color: var(--bg-color); border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; }
        .main-content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 16px; border-bottom: 1px solid #e5e7eb; background: var(--bg-color); }
        .content-area { flex-grow: 1; padding: 24px; overflow-y: auto; }
        .card { background: var(--bg-color); border-radius: 8px; border: 1px solid #e5e7eb; margin-bottom: 16px; }
        .card-header { padding: 16px; border-bottom: 1px solid #e5e7eb; font-weight: 600; }
        .card-content { padding: 16px; }
        .btn { padding: 8px 16px; border-radius: 6px; border: 1px solid transparent; font-weight: 500; cursor: pointer; transition: background-color 0.2s; }
        .btn-primary { background-color: var(--primary-color); color: white; border-color: var(--primary-color); }
        .btn-primary:hover { background-color: #2563eb; }
        .btn-secondary { background-color: var(--secondary-color); color: var(--text-color); border-color: #d1d5db; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 4px; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; }
        .pdf-list-item { display: flex; align-items: center; justify-content: space-between; padding: 8px; border-radius: 6px; margin-bottom: 8px; background: #f9fafb; }
        #image-preview-area { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
        .image-preview-item { position: relative; border: 2px dashed #d1d5db; border-radius: 8px; overflow: hidden; height: 100px; }
        .image-preview-item img { width: 100%; height: 100%; object-fit: cover; }
        #cropper-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; display: none; align-items: center; justify-content: center; }
        #cropper-wrapper { background: white; padding: 20px; border-radius: 8px; }
        #loader { display: none; position: absolute; inset: 0; background: rgba(255,255,255,0.8); align-items: center; justify-content: center; }
        #loader i { font-size: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="card-header"><strong>Kontrol Paneli</strong></div>
        <div class="card-content" style="flex-grow:1; overflow-y: auto;">
            <div class="form-group"><label for="topic">Konu Başlığı</label><input type="text" id="topic" value="Hücre ve Yapısı"></div>
            <div class="form-group"><label for="course">Ders</label><input type="text" id="course" value="Biyoloji"></div>
            <div class="form-group"><label for="grade">Sınıf</label><input type="text" id="grade" value="9"></div>
            <div class="form-group"><label for="pdf-upload" class="btn btn-secondary" style="display:block; text-align: center;">PDF Yükle</label><input type="file" id="pdf-upload" multiple accept=".pdf" style="display:none;"></div>
            <div id="pdf-list"></div>
        </div>
        <div style="padding: 16px; border-top: 1px solid #e5e7eb;">
            <button id="generate-btn" class="btn btn-primary" style="width: 100%;"><i class="fas fa-bolt"></i> Oluştur</button>
        </div>
    </div>
    <div class="main-content">
        <div class="header"><strong>İçerik Önizleme</strong></div>
        <div class="content-area">
             <div class="card">
                <div class="card-header">Seçilen Görseller</div>
                <div class="card-content">
                    <div id="image-preview-area"></div>
                </div>
            </div>
            <div id="pdf-viewer"></div>
        </div>
    </div>
    <div id="cropper-container">
        <div id="cropper-wrapper">
            <div style="width: 60vw; height: 60vh;"><img id="cropper-image" style="max-width: 100%; max-height: 100%;"></div>
            <div style="text-align: right; margin-top: 10px;">
                <button id="crop-btn" class="btn btn-primary">Kırp ve Ekle</button>
                <button id="cancel-crop-btn" class="btn btn-secondary">İptal</button>
            </div>
        </div>
    </div>
    <div id="loader"><i class="fas fa-spinner"></i></div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.9.359/pdf.worker.min.js';
        let loadedPdfs = [];
        let cropper;
        let currentPdfForCropping = null;
        let currentPageNumForCropping = null;

        document.getElementById('pdf-upload').addEventListener('change', handlePdfUpload);
        document.getElementById('generate-btn').addEventListener('click', handleGenerateClick);

        async function handlePdfUpload(event) {
            const files = event.target.files;
            for (const file of files) {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const pdfData = new Uint8Array(e.target.result);
                    const pdfDoc = await pdfjsLib.getDocument({ data: pdfData }).promise;
                    const pdfItem = { file, pdfDoc, pageRanges: `1-${pdfDoc.numPages}` };
                    loadedPdfs.push(pdfItem);
                    renderPdfList();
                };
                reader.readAsArrayBuffer(file);
            }
        }
        
        function renderPdfList() {
            const listEl = document.getElementById('pdf-list');
            listEl.innerHTML = '';
            loadedPdfs.forEach((pdfItem, index) => {
                const itemEl = document.createElement('div');
                itemEl.className = 'pdf-list-item';
                itemEl.innerHTML = `
                    <span style="flex-grow:1; white-space:nowrap; overflow:hidden; text-overflow: ellipsis;">${pdfItem.file.name}</span>
                    <input type="text" value="${pdfItem.pageRanges}" onchange="updatePageRanges(${index}, this.value)" style="width: 80px; margin: 0 8px; text-align: center;">
                    <button onclick="viewPdf(${index})" class="btn" style="padding: 4px 8px;"><i class="fas fa-eye"></i></button>
                `;
                listEl.appendChild(itemEl);
            });
        }

        window.updatePageRanges = (index, value) => {
            loadedPdfs[index].pageRanges = value;
        };

        window.viewPdf = async (index) => {
            const viewer = document.getElementById('pdf-viewer');
            viewer.innerHTML = '<h3>PDF Yükleniyor...</h3>';
            const { pdfDoc } = loadedPdfs[index];
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale: 1.5 });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                const imgData = canvas.toDataURL();
                
                const pageContainer = document.createElement('div');
                pageContainer.style.marginBottom = '20px';
                pageContainer.style.border = '1px solid #ccc';
                pageContainer.style.padding = '10px';
                
                const pageHeader = document.createElement('h4');
                pageHeader.innerText = `Sayfa ${i}`;
                pageContainer.appendChild(pageHeader);

                const img = new Image();
                img.src = imgData;
                img.style.maxWidth = '100%';
                pageContainer.appendChild(img);

                const cropButton = document.createElement('button');
                cropButton.innerText = 'Bu Sayfadan Görsel Kırp';
                cropButton.className = 'btn btn-secondary';
                cropButton.onclick = () => startCropping(index, i);
                pageContainer.appendChild(cropButton);

                viewer.appendChild(pageContainer);
            }
            if(viewer.children.length > 0) viewer.children[0].remove(); // Remove loading text
        };

        function startCropping(pdfIndex, pageNum) {
            currentPdfForCropping = pdfIndex;
            currentPageNumForCropping = pageNum;
            const container = document.getElementById('cropper-container');
            const image = document.getElementById('cropper-image');
            const canvas = document.querySelector(`#pdf-viewer canvas:nth-of-type(${pageNum})`) || document.querySelector(`#pdf-viewer img:nth-of-type(${pageNum})`);
            
            if (!canvas) {
                alert("Önizleme bulunamadı.");
                return;
            }

            image.src = canvas.toDataURL ? canvas.toDataURL() : canvas.src;
            container.style.display = 'flex';

            if (cropper) cropper.destroy();
            cropper = new Cropper(image, { aspectRatio: 16 / 9, viewMode: 1 });
        }
        
        document.getElementById('cancel-crop-btn').onclick = () => {
            document.getElementById('cropper-container').style.display = 'none';
            if(cropper) cropper.destroy();
        };

        document.getElementById('crop-btn').onclick = () => {
            const croppedCanvas = cropper.getCroppedCanvas();
            const dataUrl = croppedCanvas.toDataURL();
            
            const previewArea = document.getElementById('image-preview-area');
            const item = document.createElement('div');
            item.className = 'image-preview-item';
            const img = document.createElement('img');
            img.src = dataUrl;
            item.appendChild(img);
            previewArea.appendChild(item);

            document.getElementById('cropper-container').style.display = 'none';
            if(cropper) cropper.destroy();
        };
        
        function parsePageRanges(rangesStr) {
            const pages = new Set();
            const parts = rangesStr.split(',');
            for (const part of parts) {
                if (part.includes('-')) {
                    const [start, end] = part.split('-').map(Number);
                    for (let i = start; i <= end; i++) pages.add(i);
                } else {
                    pages.add(Number(part));
                }
            }
            return Array.from(pages);
        }

        async function handleGenerateClick() {
            const btn = document.getElementById('generate-btn');
            const loader = document.getElementById('loader');

            try {
                btn.disabled = true;
                loader.style.display = 'flex';

                const topic = document.getElementById('topic').value;
                const course = document.getElementById('course').value;
                const grade = document.getElementById('grade').value;

                let sourcesText = '';
                for (const pdfItem of loadedPdfs) {
                    if (pdfItem.pdfDoc) {
                        const pageRanges = parsePageRanges(pdfItem.pageRanges);
                        for (const pageNum of pageRanges) {
                            if (pageNum > 0 && pageNum <= pdfItem.pdfDoc.numPages) {
                                const page = await pdfItem.pdfDoc.getPage(pageNum);
                                const textContent = await page.getTextContent();
                                sourcesText += textContent.items.map(item => item.str).join(' ') + '\n\n';
                            }
                        }
                    }
                }
                
                const images = Array.from(document.querySelectorAll('#image-preview-area img')).map(img => img.src);

                const payload = { topic, course, grade, sources: sourcesText, images };

                window.parent.postMessage({ type: 'generateMaterial', payload }, '*');

            } catch (error) {
                console.error("Oluşturma hatası:", error);
                alert("Materyal oluşturulurken bir hata oluştu. Lütfen konsolu kontrol edin.");
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }
        
         window.addEventListener('message', (event) => {
            if (event.data.type === 'materialGenerated') {
                const { slides } = event.data.payload;
                const viewer = document.getElementById('pdf-viewer');
                viewer.innerHTML = '';
                slides.forEach(slide => {
                    const slideEl = document.createElement('div');
                    slideEl.style.border = '1px solid #ccc';
                    slideEl.style.padding = '20px';
                    slideEl.style.marginBottom = '20px';
                    slideEl.style.background = 'white';

                    if(slide.title) slideEl.innerHTML += `<h2>${slide.title}</h2>`;
                    if(slide.subtitle) slideEl.innerHTML += `<h3>${slide.subtitle}</h3>`;
                    if(slide.content) slideEl.innerHTML += `<p>${slide.content}</p>`;
                    if(slide.points) slideEl.innerHTML += `<ul>${slide.points.map(p => `<li>${p}</li>`).join('')}</ul>`;
                    if(slide.customImage) slideEl.innerHTML += `<img src="${slide.customImage}" style="max-width: 100%; border-radius: 8px; margin-top: 10px;">`;
                    
                    viewer.appendChild(slideEl);
                });
            }
        });

    </script>
</body>
</html>
